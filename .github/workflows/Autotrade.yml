name: Trading Bot (Commit + Daily Session)

on:
  push:
    branches:
      - main
      - master
      - "*"     # runs on ANY branch you commit to

  schedule:
    # 1:00 PM CST = 18:00 UTC
    - cron: "0 18 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run trading bot (full 1pm–2:24pm session)
      run: |
        echo "Starting trading bot session..."
        end=$(( $(date +%s) + 5040 ))  # 84 minutes = 1:00 PM → 2:24 PM
        while [ $(date +%s) -lt $end ]; do
          python trading.py
        done
