name: Trading Bot (Commit + 2:15 PM, 3 Cycles)

on:
  push:
    branches:
      - main
      - master
      - "*"     # runs on ANY branch you commit to

  schedule:
    # 2:15 PM CST/CDT = 19:15 UTC
    - cron: "15 19 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.14.3"

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run trading bot (Python handles 3 cycles)
      run: |
        echo "Starting trading bot..."
        python trading.py
        echo "Bot finished. Workflow complete."
