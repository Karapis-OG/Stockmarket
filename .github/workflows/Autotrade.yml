name: Trading Bot (Commit + Daily Session, 3 Cycles)

on:
  push:
    branches:
      - main
      - master
      - "*"     # runs on ANY branch you commit to

  schedule:
    # 1:00 PM CST = 18:00 UTC
    - cron: "0 18 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run trading bot (3 cycles only)
      run: |
        echo "Starting 3-cycle trading bot session..."
        cycles=0
        while [ $cycles -lt 3 ]; do
          echo "Running cycle $((cycles+1))..."
          python trading.py
          cycles=$((cycles+1))
          echo "Waiting 60 seconds before next cycle..."
          sleep 60
        done
        echo "Finished 3 cycles. Session complete."
