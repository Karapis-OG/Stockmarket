name: Trading Bot (Commit + Daily Session, 3 Cycles)

on:
  push:
    branches:
      - main
      - master
      - "*"     # runs on ANY branch you commit to

  schedule:
    # 1:00 PM CST/CDT = 18:00 UTC
    - cron: "0 18 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.14.3"

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run trading bot (3 cycles only, but only inside time window)
      run: |
        echo "Starting trading bot session..."
        
        # Get current time in HHMM format
        now=$(date +%H%M)
        
        # Allowed window: 13:00 (1300) to 14:24 (1424)
        if [ "$now" -lt 1300 ] || [ "$now" -gt 1424 ]; then
          echo "Outside allowed trading window (13:00–14:24). Exiting."
          exit 0
        fi
        
        cycles=0
        while [ $cycles -lt 3 ]; do
          echo "Running cycle $((cycles+1))..."
          python trading.py
          cycles=$((cycles+1))
          echo "Waiting 60 seconds before next cycle..."
          sleep 60
        done
        
        echo "Finished 3 cycles. Session complete."
